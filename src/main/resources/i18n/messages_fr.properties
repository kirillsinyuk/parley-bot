command.start.response=Bonjour\u00a0! Ce bot aide \u00e0 communiquer avec une traduction bidirectionnelle.\n \
  Ajoutez-moi \u00e0 n'importe quel groupe, d\u00e9finissez la langue pr\u00e9f\u00e9r\u00e9e avec '/lang [code langue]' et commencez \u00e0 discuter\u00a0!\n \
  Vous pouvez trouver la liste des langues prises en charge et plus d'informations ici\u00a0: /help\n \
  Si vous souhaitez laisser un avis sur ce bot ou si vous avez trouv\u00e9 un bug, utilisez\u00a0: /feedback [message]\n \
  P.S. Ce bot ne stocke pas les messages sous quelque forme que ce soit. Mais quand m\u00eame, n'envoyez pas d'informations sensibles dans les chats avec ce bot. Ne faites confiance \u00e0 personne par d\u00e9faut (;
command.help.response=Liste des langues prises en charge\u00a0: EN, ES, FR, IT, JA, RU, DE, GE.\n\
  Si vous souhaitez obtenir une version audio d'un message, envoyez /voice en r\u00e9ponse au message cible.\n \
  Si vous souhaitez l'explication grammaticale, envoyez /explain en r\u00e9ponse au message cible.\n \
  Pour tout commentaire, bug ou suggestion, envoyez '/feedback [message]'
command.set_lang.response=Langue d\u00e9finie
command.feedback.response=Merci pour votre retour\u00a0!
command.voice.no-text-response=Pour utiliser cette commande, envoyez-la en r\u00e9ponse au message que vous souhaitez convertir en voix
command.voice.transcription-error=D\u00e9sol\u00e9, impossible de transcrire le message vocal
command.explain.no-text-response=Pour utiliser cette commande, envoyez-la en r\u00e9ponse au message que vous souhaitez expliquer
