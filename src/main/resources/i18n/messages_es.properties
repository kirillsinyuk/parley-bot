command.start.response=\u00a1Hola! Este bot ayuda a comunicarse con traducci\u00f3n bidireccional.\n \
  \u00a1A\u00f1\u00e1deme a cualquier grupo, establece el idioma preferido con '/lang [c\u00f3digo de idioma]' y empieza a conversar!\n \
  Puedes encontrar la lista de idiomas admitidos y m\u00e1s informaci\u00f3n aqu\u00ed: /help\n \
  Si quieres dejar un comentario sobre este bot o encontraste un error, usa: /feedback [mensaje]\n \
  P.D. Este bot no almacena mensajes de ninguna forma. Pero de todas formas, no env\u00edes informaci\u00f3n sensible a chats con este bot. No conf\u00edes en nadie por defecto (;
command.help.response=Lista de idiomas admitidos: EN, ES, FR, IT, JA, RU, DE, GE.\n\
  Si quieres obtener una versi\u00f3n de audio de un mensaje, env\u00eda /voice en respuesta al mensaje objetivo.\n \
  Si quieres la explicaci\u00f3n gramatical, env\u00eda /explain en respuesta al mensaje objetivo.\n \
  Para comentarios, errores y sugerencias env\u00eda '/feedback [mensaje]'
command.set_lang.response=Idioma establecido
command.feedback.response=\u00a1Gracias por tu comentario!
command.voice.no-text-response=Para usar este comando, env\u00edalo como respuesta al mensaje que quieres convertir a voz
command.voice.transcription-error=Lo sentimos, no se pudo transcribir el mensaje de voz
command.explain.no-text-response=Para usar este comando, env\u00edalo como respuesta al mensaje que quieres explicar
