command.start.response=Hello! This bot helps to communicate with 2 side translation.\n \
  Just add me to any group, set preferred lang with '/lang [lang code]' and start conversation!\n \
  You can find the list of supported languages and more information here: /help\n \
  If you want to leave a feedback about this bot, or you found a bug, use: /feedback [message]\n \
  P.S. This bot doesn't store messages in any form. But anyway, don't send any sensitive information to chats with this bot. Don't trust anybody by default (;
command.help.response=The list of supported languages: EN, ES, FR, IT, JA, RU, DE, GE.\n\
  If you want to get audio version of a message, send /voice in reply to the target message.\n \
  If you want the grammar explanation, send /explain in reply to the target message.\n \
  For any comments, bugs, and suggestions send '/feedback [message]'
command.set_lang.response=Language is set
command.feedback.response=Thank you for your feedback!
command.voice.no-text-response=To use this command, send it with reply to message that you want to be turned to speech
command.voice.transcription-error=Sorry, could not transcribe the voice message
command.explain.no-text-response=To use this command, send it with reply to message that you want to be explained
