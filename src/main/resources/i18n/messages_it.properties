command.start.response=Ciao! Questo bot aiuta a comunicare con traduzione bidirezionale.\n \
  Aggiungimi a qualsiasi gruppo, imposta la lingua preferita con '/lang [codice lingua]' e inizia a chattare!\n \
  Puoi trovare l'elenco delle lingue supportate e ulteriori informazioni qui: /help\n \
  Se vuoi lasciare un feedback su questo bot o hai trovato un bug, usa: /feedback [messaggio]\n \
  P.S. Questo bot non memorizza i messaggi in alcuna forma. Ma comunque, non inviare informazioni sensibili nelle chat con questo bot. Non fidarti di nessuno per impostazione predefinita (;
command.help.response=Elenco delle lingue supportate: EN, ES, FR, IT, JA, RU, DE, GE.\n\
  Se vuoi ottenere la versione audio di un messaggio, invia /voice in risposta al messaggio target.\n \
  Se vuoi la spiegazione grammaticale, invia /explain in risposta al messaggio target.\n \
  Per commenti, bug e suggerimenti invia '/feedback [messaggio]'
command.set_lang.response=Lingua impostata
command.feedback.response=Grazie per il tuo feedback!
command.voice.no-text-response=Per usare questo comando, invialo come risposta al messaggio che vuoi convertire in voce
command.voice.transcription-error=Spiacenti, impossibile trascrivere il messaggio vocale
command.explain.no-text-response=Per usare questo comando, invialo come risposta al messaggio che vuoi spiegare
