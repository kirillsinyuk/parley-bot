command.start.response=Hallo! Dieser Bot hilft bei der Kommunikation mit zweiseitiger \u00dcbersetzung.\n \
  F\u00fcge mich einer beliebigen Gruppe hinzu, lege die bevorzugte Sprache mit '/lang [Sprachcode]' fest und fang an zu chatten!\n \
  Die Liste der unterst\u00fctzten Sprachen und weitere Informationen findest du hier: /help\n \
  Wenn du Feedback zu diesem Bot hinterlassen oder einen Fehler melden m\u00f6chtest, verwende: /feedback [Nachricht]\n \
  P.S. Dieser Bot speichert Nachrichten in keiner Form. Aber dennoch: Sende keine sensiblen Informationen in Chats mit diesem Bot. Vertraue standardm\u00e4\u00dfig niemandem (;
command.help.response=Liste der unterst\u00fctzten Sprachen: EN, ES, FR, IT, JA, RU, DE, GE.\n\
  Wenn du eine Audioversion einer Nachricht m\u00f6chtest, sende /voice als Antwort auf die Zielnachricht.\n \
  Wenn du die Grammatikerkl\u00e4rung m\u00f6chtest, sende /explain als Antwort auf die Zielnachricht.\n \
  F\u00fcr Kommentare, Fehler und Vorschl\u00e4ge sende '/feedback [Nachricht]'
command.set_lang.response=Sprache wurde gesetzt
command.feedback.response=Vielen Dank f\u00fcr dein Feedback!
command.voice.no-text-response=Um diesen Befehl zu verwenden, sende ihn als Antwort auf die Nachricht, die du in Sprache umwandeln m\u00f6chtest
command.voice.transcription-error=Entschuldigung, die Sprachnachricht konnte nicht transkribiert werden
command.explain.no-text-response=Um diesen Befehl zu verwenden, sende ihn als Antwort auf die Nachricht, die du erkl\u00e4rt haben m\u00f6chtest
